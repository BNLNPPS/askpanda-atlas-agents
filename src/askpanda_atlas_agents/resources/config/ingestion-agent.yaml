sources:
  - name: example_cric
    type: cric_queue_data
    mode: file
    path: src/askpanda_atlas_agents/resources/config/example_queue.json
    interval_s: 1

# BigPanda jobs downloader configuration.
# Downloads job data from https://bigpanda.cern.ch/jobs/?computingsite=<QUEUE>&json&hours=1
# for each queue in the list, once per cycle_interval_s seconds.
# A delay of inter_queue_delay_s seconds is inserted between consecutive queue downloads
# to avoid overloading the server and the database.
bigpanda_jobs:
  enabled: true
  queues:
    - SWT2_CPB
    - BNL
  cycle_interval_s: 1800      # 30 minutes
  inter_queue_delay_s: 60     # 1 minute between queues

duckdb_path: "jobs.duckdb"
tick_interval_s: 1.0
